name: cyberplayer
description: A cyberpunk terminal-style music player for Android.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  just_audio: ^0.9.42
  just_audio_background: ^0.0.1-beta.13
  audio_service: ^0.18.15
  on_audio_query: ^2.9.0
  permission_handler: ^11.3.1
  path: ^1.9.0
  shared_preferences: ^2.3.3
  rxdart: ^0.28.0
  audio_session: ^0.1.21

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
        - asset: assets/fonts/JetBrainsMono-Light.ttf
          weight: 300
