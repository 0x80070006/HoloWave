allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

// Fix namespace + JVM target for old plugins
subprojects { sub ->
    sub.plugins.withId("com.android.library") {
        if (sub.android.namespace == null || sub.android.namespace.isEmpty()) {
            def manifest = new File(sub.projectDir, "src/main/AndroidManifest.xml")
            if (manifest.exists()) {
                def xml = new groovy.util.XmlSlurper().parse(manifest)
                def pkg = xml.@package.toString()
                if (pkg) {
                    sub.android.namespace = pkg
                }
            }
        }
        sub.android.compileOptions {
            sourceCompatibility JavaVersion.VERSION_17
            targetCompatibility JavaVersion.VERSION_17
        }
    }
    sub.plugins.withId("org.jetbrains.kotlin.android") {
        sub.android.kotlinOptions {
            jvmTarget = "17"
        }
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
